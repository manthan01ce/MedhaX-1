<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CodeDuel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page-center">
    <div class="auth-container">
      <div class="card card-glow">
        <h2>Create Account</h2>
        <p class="subtitle">Join the arena and start coding battles</p>
        <div id="error-msg" class="form-error hidden"></div>
        <form id="register-form">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-input" type="text" id="username" name="username" placeholder="Choose a unique username" required minlength="3" maxlength="20" autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password" placeholder="At least 4 characters" required minlength="4" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm Password</label>
            <input class="form-input" type="password" id="confirm-password" placeholder="Re-enter your password" required autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary w-full" id="register-btn">Create Account</button>
        </form>
        <div class="auth-footer">
          Already have an account? <a href="/login.html">Login</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
