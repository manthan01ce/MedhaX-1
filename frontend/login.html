<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CodeDuel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page-center">
    <div class="auth-container">
      <div class="card card-glow">
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to start battling</p>
        <div id="error-msg" class="form-error hidden"></div>
        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-input" type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary w-full" id="login-btn">Login</button>
        </form>
        <div class="auth-footer">
          Don't have an account? <a href="/register.html">Register</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
